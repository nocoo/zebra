name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: G1 Static Analysis
        run: bun run lint

      - name: L1 Unit Tests + Coverage
        run: bun run test:coverage

      - name: G2a Dependency CVE Scan
        run: |
          # Install osv-scanner
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.0.2/osv-scanner_linux_amd64 -o /tmp/osv-scanner
          chmod +x /tmp/osv-scanner
          # Scan bun.lock for vulnerabilities
          /tmp/osv-scanner --lockfile=bun.lock
